<!DOCTYPE html>
<html>
<head><title>Holodex — Authorizing...</title></head>
<body>
<script>
(function() {
  var hash = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function(pair) {
    var parts = pair.split('=');
    params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
  });

  var storedState = sessionStorage.getItem('holodex_oauth_state');
  var provider = sessionStorage.getItem('holodex_oauth_provider') || 'google';

  // Clean up
  sessionStorage.removeItem('holodex_oauth_state');
  sessionStorage.removeItem('holodex_oauth_provider');

  var message;
  if (params.error) {
    message = { type: 'holodex-auth', provider: provider, error: params.error_description || params.error };
  } else if (params.access_token) {
    // CSRF check
    if (storedState && params.state && params.state !== storedState) {
      message = { type: 'holodex-auth', provider: provider, error: 'State mismatch — possible CSRF' };
    } else {
      message = {
        type: 'holodex-auth',
        provider: provider,
        accessToken: params.access_token,
        expiresIn: parseInt(params.expires_in, 10) || 3600,
      };
    }
  } else {
    message = { type: 'holodex-auth', provider: provider, error: 'No token in response' };
  }

  if (window.opener) {
    window.opener.postMessage(message, window.location.origin);
    window.close();
  } else {
    // Fallback: store and redirect
    document.body.innerHTML = '<p>Authorization complete. You can close this tab.</p>';
  }
})();
</script>
</body>
</html>
